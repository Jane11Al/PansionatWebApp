spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/PansionatDB
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        default_schema: dbo
    show-sql: true
server:
  port: 8080
jwt:
  secret: "SuPerSecRetKeyForJWTGenerationThatShouldBeLongEnoughAtLeast256Bits"
  expiration: 86400000  # 24 часа